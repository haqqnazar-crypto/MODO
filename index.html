<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Физика — МОДО Тесті</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --v2: #2563eb; --v2-light: #dbeafe; --v2-bg: #eff6ff;
    --v4: #d97706; --v4-light: #fde68a; --v4-bg: #fffbeb;
    --v6: #059669; --v6-light: #a7f3d0; --v6-bg: #ecfdf5;
    --v7: #7c3aed; --v7-light: #ddd6fe; --v7-bg: #f5f3ff;
    --dark: #0f172a; --mid: #334155; --soft: #64748b;
    --bg: #f1f5f9; --card: #ffffff;
    --correct: #16a34a; --wrong: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--dark);
  }

  /* ===== WELCOME ===== */
  #welcome {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e40af 100%);
  }
  .logo-ring {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; margin-bottom: 20px;
    box-shadow: 0 0 40px rgba(59,130,246,0.5);
  }
  .welcome-title {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(22px, 5vw, 32px);
    color: #fff;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .welcome-sub {
    color: #94a3b8;
    font-size: 15px;
    text-align: center;
    margin-bottom: 40px;
  }
  .welcome-card {
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 32px;
    width: 100%; max-width: 420px;
  }
  .welcome-card label {
    display: block;
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .name-input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }
  .name-input::placeholder { color: #64748b; }
  .name-input:focus { border-color: #60a5fa; }
  .btn-start {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    background: linear-gradient(135deg, #3b82f6, #6d28d9);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(59,130,246,0.4);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(59,130,246,0.5); }
  .btn-start:active { transform: translateY(0); }
  .stats-row {
    display: flex; gap: 12px; margin-top: 24px;
  }
  .stat-pill {
    flex: 1; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 12px 8px;
    text-align: center;
  }
  .stat-pill .num {
    display: block; color: #60a5fa;
    font-family: 'Unbounded', sans-serif;
    font-size: 20px; font-weight: 700;
  }
  .stat-pill .lbl {
    display: block; color: #94a3b8;
    font-size: 11px; margin-top: 2px;
  }

  /* ===== QUIZ ===== */
  #quiz { display: none; min-height: 100vh; flex-direction: column; }
  .quiz-header {
    background: linear-gradient(135deg, #0f172a, #1e3a5f);
    padding: 16px 20px 0;
    position: sticky; top: 0; z-index: 10;
  }
  .quiz-header-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .student-name { color: #94a3b8; font-size: 13px; font-weight: 600; }
  .student-name span { color: #60a5fa; }
  .q-counter { color: #fff; font-family: 'Unbounded', sans-serif; font-size: 12px; }
  .progress-bar {
    height: 4px; background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden; margin-bottom: 0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .quiz-body {
    flex: 1; padding: 20px 16px 100px;
    max-width: 600px; margin: 0 auto; width: 100%;
  }
  .variant-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 800;
    letter-spacing: 0.05em; margin-bottom: 6px;
  }
  .topic-label {
    font-size: 13px; color: var(--soft); font-weight: 600;
    margin-bottom: 16px;
  }
  .question-card {
    background: var(--card);
    border-radius: 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 24px;
    margin-bottom: 16px;
    border-left: 4px solid transparent;
  }
  .q-num { font-size: 11px; color: var(--soft); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
  .q-text { font-size: 16px; font-weight: 700; line-height: 1.5; white-space: pre-line; }
  .img-notice {
    margin-top: 10px; padding: 8px 12px;
    background: #fef3c7; border-radius: 8px;
    font-size: 12px; color: #92400e; font-weight: 600;
  }

  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    border-radius: 13px;
    border: 2px solid #e2e8f0;
    background: #fff;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    width: 100%;
    font-family: 'Nunito', sans-serif;
  }
  .opt-btn:hover:not(:disabled) { border-color: #93c5fd; background: #eff6ff; }
  .opt-btn.selected { border-color: #3b82f6; background: #dbeafe; }
  .opt-letter {
    width: 30px; height: 30px; flex-shrink: 0;
    border-radius: 50%;
    background: #f1f5f9;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 13px; color: var(--mid);
    transition: all 0.18s;
  }
  .opt-btn.selected .opt-letter { background: #3b82f6; color: #fff; }
  .opt-btn.correct-ans { border-color: var(--correct); background: #f0fdf4; }
  .opt-btn.correct-ans .opt-letter { background: var(--correct); color: #fff; }
  .opt-btn.wrong-ans { border-color: var(--wrong); background: #fef2f2; }
  .opt-btn.wrong-ans .opt-letter { background: var(--wrong); color: #fff; }
  .opt-btn:disabled { cursor: default; }
  .opt-text { font-size: 15px; font-weight: 600; color: var(--dark); }

  .quiz-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 14px 20px env(safe-area-inset-bottom);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    display: flex; gap: 10px; justify-content: center;
    max-width: 600px; margin: 0 auto; left: 50%; transform: translateX(-50%);
  }
  .btn-nav {
    padding: 13px 24px; border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800;
    border: none; cursor: pointer; transition: all 0.15s;
  }
  .btn-prev { background: #f1f5f9; color: var(--mid); }
  .btn-prev:hover { background: #e2e8f0; }
  .btn-confirm {
    flex: 1; background: linear-gradient(135deg, #3b82f6, #6d28d9);
    color: #fff;
    box-shadow: 0 4px 15px rgba(59,130,246,0.35);
  }
  .btn-confirm:hover { transform: translateY(-1px); }
  .btn-confirm:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; }
  .btn-next { background: #0f172a; color: #fff; padding: 13px 28px; }
  .btn-next:hover { background: #1e293b; }

  /* ===== RESULTS ===== */
  #results { display: none; min-height: 100vh; }
  .results-header {
    background: linear-gradient(135deg, #0f172a, #1e3a5f);
    padding: 40px 20px 60px;
    text-align: center;
  }
  .results-header h2 {
    font-family: 'Unbounded', sans-serif;
    color: #fff; font-size: clamp(18px, 4vw, 26px);
    margin-bottom: 6px;
  }
  .results-header .rname { color: #60a5fa; font-size: 15px; margin-bottom: 28px; }
  .score-circle {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: conic-gradient(#3b82f6 0%, #8b5cf6 100%);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 8px;
    box-shadow: 0 0 50px rgba(59,130,246,0.4);
    position: relative;
  }
  .score-inner {
    width: 106px; height: 106px;
    border-radius: 50%; background: #0f172a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-num {
    font-family: 'Unbounded', sans-serif;
    color: #fff; font-size: 28px; line-height: 1;
  }
  .score-denom { color: #64748b; font-size: 13px; }
  .score-pct { color: #94a3b8; font-size: 14px; margin-top: 8px; }
  .score-grade {
    display: inline-block;
    padding: 6px 20px; border-radius: 20px;
    font-weight: 800; font-size: 14px; margin-top: 10px;
  }

  .results-body { padding: 20px 16px 100px; max-width: 600px; margin: 0 auto; }
  .variant-section { margin-bottom: 28px; }
  .variant-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border-radius: 12px;
    margin-bottom: 12px; font-weight: 800;
  }
  .res-item {
    background: #fff; border-radius: 14px;
    padding: 16px; margin-bottom: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex; gap: 12px; align-items: flex-start;
  }
  .res-status {
    width: 28px; height: 28px; flex-shrink: 0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800;
  }
  .res-correct { background: #dcfce7; color: #16a34a; }
  .res-wrong { background: #fee2e2; color: #dc2626; }
  .res-unknown { background: #fef3c7; color: #d97706; }
  .res-content { flex: 1; min-width: 0; }
  .res-qtext { font-size: 13px; font-weight: 700; color: var(--dark); line-height: 1.4; margin-bottom: 6px; }
  .res-answers { display: flex; gap: 6px; flex-wrap: wrap; font-size: 12px; }
  .res-tag {
    padding: 3px 10px; border-radius: 6px;
    font-weight: 700;
  }
  .res-tag-student { background: #dbeafe; color: #1d4ed8; }
  .res-tag-correct { background: #dcfce7; color: #15803d; }
  .res-tag-unknown { background: #fef3c7; color: #b45309; }

  .download-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 14px 20px env(safe-area-inset-bottom);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
    display: flex; gap: 10px;
    max-width: 600px; margin: 0 auto; left: 50%; transform: translateX(-50%);
  }
  .btn-pdf {
    flex: 1; padding: 14px;
    border-radius: 12px;
    background: linear-gradient(135deg, #dc2626, #9333ea);
    color: #fff; border: none; cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 800;
    box-shadow: 0 4px 15px rgba(220,38,38,0.3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-pdf:hover { transform: translateY(-1px); }
  .btn-retry {
    padding: 14px 20px; border-radius: 12px;
    background: #f1f5f9; color: var(--mid);
    border: none; cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 700;
  }

  /* Variant theme borders */
  .v2-card { border-left-color: var(--v2); }
  .v4-card { border-left-color: var(--v4); }
  .v6-card { border-left-color: var(--v6); }
  .v7-card { border-left-color: var(--v7); }

  /* ===== PRINT STYLES ===== */
  @media print {
    body { background: #fff !important; }
    #welcome, #quiz, .download-bar, .btn-pdf, .btn-retry { display: none !important; }
    #results { display: block !important; }
    .results-header { background: #1e3a5f !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .download-bar { display: none !important; }
    .score-circle { background: #3b82f6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .score-inner { background: #1e3a5f !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .variant-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .res-tag { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .res-status { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .results-body { padding-bottom: 20px !important; }
    page { margin: 10mm; }
  }
</style>
</head>
<body>

<!-- ===== WELCOME SCREEN ===== -->
<div id="welcome">
  <div class="logo-ring">⚡</div>
  <h1 class="welcome-title">Физика<br>МОДО Тесті</h1>
  <p class="welcome-sub">Модульдік оқу деңгейін тексеру</p>
  <div class="welcome-card">
    <label for="nameInput">Аты-жөніңізді енгізіңіз</label>
    <input type="text" id="nameInput" class="name-input" placeholder="Мысалы: Айдар Сейтқали" autocomplete="name">
    <button class="btn-start" onclick="startQuiz()">Тестті бастау →</button>
    <div class="stats-row">
      <div class="stat-pill"><span class="num">4</span><span class="lbl">Нұсқа</span></div>
      <div class="stat-pill"><span class="num">32</span><span class="lbl">Сұрақ</span></div>
      <div class="stat-pill"><span class="num">PDF</span><span class="lbl">Нәтиже</span></div>
    </div>
  </div>
</div>

<!-- ===== QUIZ SCREEN ===== -->
<div id="quiz" style="display:none; flex-direction:column;">
  <div class="quiz-header">
    <div class="quiz-header-row">
      <div class="student-name">Оқушы: <span id="displayName">—</span></div>
      <div class="q-counter" id="qCounter">1 / 32</div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:3%"></div>
    </div>
  </div>
  <div class="quiz-body" id="quizBody"></div>
  <div class="quiz-footer">
    <button class="btn-nav btn-prev" id="btnPrev" onclick="prevQ()">← Артқа</button>
    <button class="btn-nav btn-confirm" id="btnConfirm" onclick="confirmAnswer()" disabled>Бекіту ✓</button>
    <button class="btn-nav btn-next" id="btnNext" onclick="nextQ()" style="display:none">Келесі →</button>
  </div>
</div>

<!-- ===== RESULTS SCREEN ===== -->
<div id="results" style="display:none;">
  <div class="results-header">
    <h2>Тест нәтижелері</h2>
    <p class="rname" id="resultsName"></p>
    <div class="score-circle">
      <div class="score-inner">
        <span class="score-num" id="scoreNum">0</span>
        <span class="score-denom" id="scoreDenom">/ 0</span>
      </div>
    </div>
    <p class="score-pct" id="scorePct"></p>
    <span class="score-grade" id="scoreGrade"></span>
  </div>
  <div class="results-body" id="resultsBody"></div>
  <div class="download-bar">
    <button class="btn-retry" onclick="restartQuiz()">🔄 Қайта</button>
    <button class="btn-pdf" onclick="downloadPDF()">📄 PDF жүктеу</button>
  </div>
</div>

<script>
const QUESTIONS = [
  // ═══ 2-НҰСҚА — Электр зарядтары ═══
  { id:1, v:2, vLabel:"2-нұсқа", topic:"Электр зарядтары",
    text:"Екі нүктелік зарядтың арасындағы әсерлесу күші неге тең?\n(Суреттегі деректер: q₁ > 0, q₂ < 0, d = 3 см)",
    opts:["А) 80 Н","В) 8 Н","С) 0,8 Н","D) 800 Н","Е) 8000 Н"], correct:null, img:true },
  { id:2, v:2, vLabel:"2-нұсқа", topic:"Электр зарядтары",
    text:"Егер бұл зарядтарды түйістірсе, қандай заряд шамасын алуға болады?",
    opts:["А) −2 мкКл","В) 2 мкКл","С) 6 мкКл","D) 8 мкКл","Е) −6 мкКл"], correct:null, img:true },
  { id:3, v:2, vLabel:"2-нұсқа", topic:"Электр зарядтары",
    text:"Егер әсерлесу күшін екі есе азайтса, нүктелік зарядтар қандай арақашықтықта болар еді?",
    opts:["А) 0,42 мм","В) 4,2 м","С) 4,2 см","D) 1,8 см","Е) 18 мм"], correct:null, img:true },
  { id:4, v:2, vLabel:"2-нұсқа", topic:"Электр зарядтары",
    text:"Берілген зарядтар үшін электр өрісінің күш сызықтарының бағытын анықтаңыз.\n(Суреттегі нұсқаны таңдаңыз)",
    opts:["А","В","С","D","Е"], correct:null, img:true },

  // ═══ 2-НҰСҚА — Ай ═══
  { id:5, v:2, vLabel:"2-нұсқа", topic:"Ай",
    text:"Ай өз өсі төңірегінде 27,3 тәулікте толық бір айналып шығады. Бұл қанша сағат және минутты құрайды?",
    opts:["А) 6,652 сағ, 39 312 мин","В) 665,2 сағ, 39 312 мин","С) 765,2 сағ, 49 312 мин","D) 675,3 сағ, 393,12 мин","Е) 6,652 сағ, 3,9312 мин"], correct:1 },
  { id:6, v:2, vLabel:"2-нұсқа", topic:"Ай",
    text:"Айдың диаметрі 13 м тең делік. Айдың ауданы қанша?",
    opts:["А) S ≈ 143 м²","В) S ≈ 33 м²","С) S ≈ 3,3 м²","D) S ≈ 133 м²","Е) S ≈ 4,3 м²"], correct:3 },
  { id:7, v:2, vLabel:"2-нұсқа", topic:"Ай",
    text:"Дөңгелек ауданының формуласы:",
    opts:["А) S = πr² = πD²/2","В) S = πr² = πD²/4","С) S = πr = πD²/4","D) S = πr² = D²/2","Е) S = πr² = π/4"], correct:1 },
  { id:8, v:2, vLabel:"2-нұсқа", topic:"Ай",
    text:"Айдың екі толық тууының арасындағы уақыты 29,5 тәулікке тең. Бұл қанша сағатты құрайды?",
    opts:["А) 608 сағ","В) 708 сағ","С) 70,8 сағ","D) 60,8 сағ","Е) 718 сағ"], correct:1 },

  // ═══ 4-НҰСҚА — Конденсатор ═══
  { id:9, v:4, vLabel:"4-нұсқа", topic:"Конденсатор",
    text:"Сыйымдылығы С = 2 мкФ конденсатор батареясын 100 В-қа дейін зарядтау үшін қанша заряд керек?",
    opts:["А) 200 мкКл","В) 200 Кл","С) 0,02 Кл","D) 400 мкКл","Е) 40 мкКл"], correct:0 },
  { id:10, v:4, vLabel:"4-нұсқа", topic:"Конденсатор",
    text:"0,01 Кл заряд бергенде 10 Дж жұмыс жасалса, конденсатордың сыйымдылығын анықтаңдар.",
    opts:["А) 5 мкФ","В) 500 мкФ","С) 0,5 мкФ","D) 100 мкФ","Е) 10 мкФ"], correct:0 },
  { id:11, v:4, vLabel:"4-нұсқа", topic:"Конденсатор",

const V_STYLE = {
  2: { badge:"background:#dbeafe;color:#1d4ed8", header:"background:#eff6ff;color:#1d4ed8", border:"border-left-color:#2563eb", icon:"⚡" },
  4: { badge:"background:#fde68a;color:#92400e", header:"background:#fffbeb;color:#b45309", border:"border-left-color:#d97706", icon:"🔋" },
  6: { badge:"background:#a7f3d0;color:#065f46", header:"background:#ecfdf5;color:#065f46", border:"border-left-color:#059669", icon:"🚗" },
  7: { badge:"background:#ddd6fe;color:#4c1d95", header:"background:#f5f3ff;color:#4c1d95", border:"border-left-color:#7c3aed", icon:"⚙️" },
};

let studentName = "";
let current = 0;
let answers = {};

function startQuiz() {
  const v = document.getElementById("nameInput").value.trim();
  if (!v) { document.getElementById("nameInput").focus(); return; }
  studentName = v;
  document.getElementById("displayName").textContent = v;
  document.getElementById("welcome").style.display = "none";
  document.getElementById("quiz").style.display = "flex";
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const total = QUESTIONS.length;
  const pct = ((current + 1) / total * 100).toFixed(0);
  document.getElementById("qCounter").textContent = `${current + 1} / ${total}`;
  document.getElementById("progressFill").style.width = pct + "%";

  const s = V_STYLE[q.v];
  const answered = answers[q.id] !== undefined;
  const sel = answered ? answers[q.id] : null;

  let optHtml = q.opts.map((opt, i) => {
    let cls = "opt-btn";
    if (answered) {
      if (q.correct !== null) {
        if (i === q.correct) cls += " correct-ans";
        else if (i === sel && sel !== q.correct) cls += " wrong-ans";
        else if (i === sel) cls += " selected";
      } else {
        if (i === sel) cls += " selected";
      }
    } else {
      if (i === sel) cls += " selected";
    }
    const letters = ["А","В","С","D","Е"];
    return `<button class="${cls}" onclick="selectOpt(${i})" ${answered ? "disabled" : ""}>
      <span class="opt-letter">${letters[i]}</span>
      <span class="opt-text">${opt}</span>
    </button>`;
  }).join("");

  const imgNotice = q.img
    ? `<div class="img-notice">⚠️ Бұл сұрақ суретке/графикке негізделген. Бастапқы нұсқамен бірге жауап беріңіз.</div>`
    : "";

  document.getElementById("quizBody").innerHTML = `
    <span class="variant-badge" style="${s.badge}">${s.icon} ${q.vLabel}</span>
    <p class="topic-label">${q.topic}</p>
    <div class="question-card" style="${s.border}">
      <div class="q-num">Сұрақ ${current + 1}</div>
      <div class="q-text">${q.text}</div>
      ${imgNotice}
    </div>
    <div class="options-list">${optHtml}</div>
  `;

  // Footer buttons
  document.getElementById("btnPrev").style.display = current > 0 ? "" : "none";
  if (answered) {
    document.getElementById("btnConfirm").style.display = "none";
    document.getElementById("btnNext").style.display = "";
    document.getElementById("btnNext").textContent = current < total - 1 ? "Келесі →" : "Нәтиже 🎯";
  } else {
    document.getElementById("btnConfirm").style.display = "";
    document.getElementById("btnConfirm").disabled = sel === null;
    document.getElementById("btnNext").style.display = "none";
  }

  window.scrollTo(0, 0);
}

function selectOpt(i) {
  if (answers[QUESTIONS[current].id] !== undefined) return;
  const q = QUESTIONS[current];
  // Temporarily store selection in answers for rendering
  const buttons = document.querySelectorAll(".opt-btn");
  buttons.forEach((b, idx) => {
    b.classList.remove("selected");
    if (idx === i) b.classList.add("selected");
  });
  document.getElementById("btnConfirm").disabled = false;
  // Store temp
  window._tempSel = i;
}

function confirmAnswer() {
  const q = QUESTIONS[current];
  const sel = window._tempSel;
  if (sel === undefined) return;
  answers[q.id] = sel;
  window._tempSel = undefined;
  renderQuestion();
}

function nextQ() {
  if (current < QUESTIONS.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResults();
  }
}

function prevQ() {
  if (current > 0) {
    current--;
    renderQuestion();
  }
}

function getScore() {
  let correct = 0, total = 0;
  QUESTIONS.forEach(q => {
    if (q.correct !== null) {
      total++;
      if (answers[q.id] === q.correct) correct++;
    }
  });
  return { correct, total };
}

function showResults() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("results").style.display = "block";

  const { correct, total } = getScore();
  const pct = Math.round(correct / total * 100);
  document.getElementById("resultsName").textContent = studentName;
  document.getElementById("scoreNum").textContent = correct;
  document.getElementById("scoreDenom").textContent = `/ ${total}`;
  document.getElementById("scorePct").textContent = `Автоматты тексерілген: ${total} сұрақ (${32 - total} сурет/графиктік)`;

  let grade, gradeStyle;
  if (pct >= 85) { grade = "🏆 Өте жақсы"; gradeStyle = "background:#dcfce7;color:#15803d"; }
  else if (pct >= 70) { grade = "👍 Жақсы"; gradeStyle = "background:#dbeafe;color:#1d4ed8"; }
  else if (pct >= 50) { grade = "📚 Қанағаттанарлық"; gradeStyle = "background:#fef3c7;color:#b45309"; }
  else { grade = "📖 Қайталау керек"; gradeStyle = "background:#fee2e2;color:#dc2626"; }
  document.getElementById("scoreGrade").textContent = grade;
  document.getElementById("scoreGrade").style = gradeStyle;

  // Build results by variant
  const variants = [2, 4, 6, 7];
  let html = "";
  variants.forEach(v => {
    const s = V_STYLE[v];
    const qs = QUESTIONS.filter(q => q.v === v);
    html += `<div class="variant-section">
      <div class="variant-header" style="${s.header}">
        <span style="font-size:20px">${s.icon}</span>
        <span>${qs[0].vLabel}</span>
      </div>`;
    qs.forEach((q, qi) => {
      const userAns = answers[q.id];
      const letters = ["А","В","С","D","Е"];
      let statusClass, statusIcon, ansHtml;
      if (q.correct === null) {
        statusClass = "res-unknown"; statusIcon = "?";
        const ua = userAns !== undefined ? letters[userAns] : "—";
        ansHtml = `<span class="res-tag res-tag-student">Жауабыңыз: ${ua}</span>
                   <span class="res-tag res-tag-unknown">Сурет/графиктік</span>`;
      } else if (userAns === q.correct) {
        statusClass = "res-correct"; statusIcon = "✓";
        ansHtml = `<span class="res-tag res-tag-correct">✓ ${letters[q.correct]}) дұрыс</span>`;
      } else {
        statusClass = "res-wrong"; statusIcon = "✗";
        const ua = userAns !== undefined ? letters[userAns] : "—";
        ansHtml = `<span class="res-tag res-tag-student">Жауабыңыз: ${ua}</span>
                   <span class="res-tag res-tag-correct">Дұрысы: ${letters[q.correct]}</span>`;
      }
      const shortText = q.text.split('\n')[0].substring(0, 80) + (q.text.length > 80 ? "…" : "");
      html += `<div class="res-item">
        <div class="res-status ${statusClass}">${statusIcon}</div>
        <div class="res-content">
          <div class="res-qtext">${qi + 1}. ${shortText}</div>
          <div class="res-answers">${ansHtml}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById("resultsBody").innerHTML = html;
  window.scrollTo(0, 0);
}

function downloadPDF() {
  const d = new Date();
  const dateStr = `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
  // Add date and title to print
  const existing = document.getElementById("print-info");
  if (existing) existing.remove();
  const info = document.createElement("div");
  info.id = "print-info";
  info.style.cssText = "display:none;position:fixed;top:0;left:0;right:0;background:#1e3a5f;color:#fff;padding:8px 16px;font-size:12px;font-family:Nunito,sans-serif;text-align:center;";
  info.innerHTML = `Физика МОДО Тесті — ${studentName} — ${dateStr}`;
  document.body.prepend(info);

  // Show in print only
  const style = document.createElement("style");
  style.id = "print-extra";
  style.textContent = `@media print { #print-info { display:block !important; } }`;
  document.head.appendChild(style);

  window.print();

  setTimeout(() => {
    document.getElementById("print-extra")?.remove();
    document.getElementById("print-info")?.remove();
  }, 2000);
}

function restartQuiz() {
  answers = {}; current = 0; window._tempSel = undefined;
  document.getElementById("results").style.display = "none";
  document.getElementById("welcome").style.display = "flex";
  document.getElementById("nameInput").value = "";
}

// Allow Enter key on name input
document.getElementById("nameInput").addEventListener("keydown", e => {
  if (e.key === "Enter") startQuiz();
});
